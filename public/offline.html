<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline - Doxa Commission Global</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: #0f172a;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      padding: 1.5rem;
    }

    .card {
      max-width: 28rem;
      width: 100%;
      border: 1px solid #dbeafe;
      border-radius: 1rem;
      background: #fff;
      padding: 1.5rem;
      box-shadow: 0 16px 36px -24px rgba(37, 99, 235, 0.35);
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.25rem;
    }

    p {
      margin: 0 0 0.75rem;
      line-height: 1.5;
      color: #475569;
    }

    a {
      display: inline-block;
      margin-top: 0.6rem;
      color: #1877f2;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>You are offline</h1>
    <p>Some pages and messages are still available from cache.</p>
    <p>Reconnect to refresh live content and media.</p>
    <a href="/">Retry</a>
  </section>
</body>
</html>
